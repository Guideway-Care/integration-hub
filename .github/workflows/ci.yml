name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - name: Typecheck
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build
      - name: Build Control Plane
        run: pnpm --filter @workspace/control-plane run build

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        target:
          - name: api-server
            file: docker/api-server.Dockerfile
          - name: control-plane
            file: docker/control-plane.Dockerfile
          - name: extraction-job
            file: docker/extraction-job.Dockerfile
          - name: incontact-processor
            file: docker/incontact-processor.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.target.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.target.file }}
          push: false
          tags: ${{ matrix.target.name }}:test
